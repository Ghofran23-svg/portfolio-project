<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styletodo.css">
</head>
<body>

<a href="index.html" class="retour">← Retour</a>

<div class="box">

    <h1>Ma To Do List</h1>

    <input type="text" id="a" placeholder="Ajouter une tâche">
    <button onclick="ajout()">Ajouter</button>

    <ul id="lis"></ul>

</div>

<script>
function ajout() {

    let a = document.getElementById("a");

    if(a.value === ""){
        alert("Ecris une tâche !");
        return;
    }

    let li = document.createElement("li");

    let btn = document.createElement("button");

    btn.textContent = "Supprimer";

    li.textContent = a.value + " ";

    li.onclick = function () {
        li.style.textDecoration = "line-through";
    };

    btn.onclick = function () {
        li.remove();
    };

    li.appendChild(btn);

    document.getElementById("lis").appendChild(li);

    a.value = "";
}
</script>

</body>
</html>
